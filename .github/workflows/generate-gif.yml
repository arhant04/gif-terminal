name: Generate Terminal GIF

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Theme to use (default | macos | debian)'
        required: false
        default: 'default'
      wallpaper:
        description: 'Wallpaper filename in assets/ for the debian theme'
        required: false
        default: ''
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install github-readme-terminal requests python-dotenv Pillow

      - name: Generate GIF
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          THEME: ${{ vars.THEME || inputs.theme || 'default' }}
          WALLPAPER: ${{ vars.WALLPAPER || inputs.wallpaper || '' }}
        run: |
          echo "Theme: $THEME"
          case "$THEME" in
            debian)
              python3 generate_debian.py
              ;;
            default)
              python3 generate_with_stats.py
              ;;
            *)
              python3 generate_liquid_glass.py
              ;;
          esac

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output.gif

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update terminal GIF [skip ci]"
          git push
